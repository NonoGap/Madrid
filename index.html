<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Madrid</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #18181c;
      --border: #2a2a30;
      --text: #e8e8e0;
      --muted: #5a5a68;
      --resto: #ff4444;
      --courses: #44cc66;
      --sympa: #4488ff;
      --star: #f59e0b;
    }

    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      flex-shrink: 0;
    }
    .topbar h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
    .topbar h1 span { color: var(--sympa); }
    .filters { display: flex; gap: 5px; }
    .filter-btn {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active-resto   { background: var(--resto);   color: #fff; border-color: var(--resto); }
    .filter-btn.active-courses { background: var(--courses); color: #fff; border-color: var(--courses); }
    .filter-btn.active-sympa   { background: var(--sympa);  color: #fff; border-color: var(--sympa); }
    .filter-btn.active-all     { background: var(--text);   color: var(--bg); border-color: var(--text); }

    /* Map */
    #map { height: 42vh; flex-shrink: 0; z-index: 0; }

    /* Add mode hint */
    .add-hint {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text);
      z-index: 1000;
      display: none;
      white-space: nowrap;
    }
    .add-hint.visible { display: block; }

    /* FAB */
    .fab {
      position: fixed;
      top: calc(44px + 42vh - 60px);
      right: 16px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--sympa);
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      z-index: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s;
    }
    .fab:hover { transform: scale(1.08); }
    .fab.active { background: #ff4f4f; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 2000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      padding: 20px 18px 32px;
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .modal-title { font-size: 15px; font-weight: 700; }
    .modal input, .modal textarea, .modal select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 13px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--sympa); }
    .modal textarea { resize: vertical; min-height: 60px; }
    .modal select option { background: var(--surface); }

    /* Stars */
    .star-row { display: flex; gap: 6px; }
    .star-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 24px;
      color: var(--border);
      transition: color 0.15s, transform 0.15s;
      padding: 0;
    }
    .star-btn.active { color: var(--star); }
    .star-btn:hover { transform: scale(1.2); }

    .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-save {
      flex: 1;
      padding: 11px;
      background: var(--sympa);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-cancel {
      padding: 11px 18px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      cursor: pointer;
    }

    /* Leaflet popup */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: 10px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .popup-name { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
    .popup-cat  { font-family: 'DM Mono', monospace; font-size: 11px; margin-bottom: 4px; }
    .popup-stars { font-size: 14px; color: var(--star); margin-bottom: 5px; }
    .popup-note { font-size: 12px; color: #aaa; margin-bottom: 8px; line-height: 1.4; }
    .popup-del {
      background: none;
      border: 1px solid #ff4f4f;
      color: #ff4f4f;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      transition: background 0.15s;
    }
    .popup-del:hover { background: rgba(255,79,79,0.12); }

    /* List panel */
    .list-panel {
      flex: 1;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .list-handle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .list-handle-title { font-size: 13px; font-weight: 700; }
    .list-handle-meta  { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
    .list-scroll { overflow-y: auto; flex: 1; }
    .place-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .place-row:hover { background: rgba(255,255,255,0.03); }
    .place-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .place-info { flex: 1; min-width: 0; }
    .place-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .place-comment { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .place-stars { font-size: 12px; color: var(--star); flex-shrink: 0; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      transition: transform 0.3s ease;
      z-index: 3000;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="topbar">
  <h1>Ma<span>drid</span></h1>
  <div class="filters">
    <button class="filter-btn active-all" onclick="setFilter('all', this)">Tous</button>
    <button class="filter-btn" onclick="setFilter('resto', this)">🍽 Restos</button>
    <button class="filter-btn" onclick="setFilter('courses', this)">🛒 Courses</button>
    <button class="filter-btn" onclick="setFilter('sympa', this)">⭐ Sympa</button>
  </div>
</div>

<div id="map"></div>
<div class="add-hint" id="addHint">Touche la carte pour placer un endroit</div>
<button class="fab" id="fab" onclick="toggleAddMode()" title="Ajouter un endroit">＋</button>

<!-- Modal ajout -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Nouvel endroit</div>
    <input type="text" id="placeName" placeholder="Nom…">
    <select id="placeCat">
      <option value="resto">🍽 Restaurant</option>
      <option value="courses">🛒 Courses</option>
      <option value="sympa">⭐ Endroit sympa</option>
    </select>
    <div class="star-row" id="modalStars"></div>
    <textarea id="placeNote" placeholder="Commentaire (optionnel)…"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="savePlace()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Liste -->
<div class="list-panel" id="listPanel">
  <div class="list-handle">
    <span class="list-handle-title">Mes endroits</span>
    <span class="list-handle-meta" id="listCount">0 endroit</span>
  </div>
  <div class="list-scroll" id="placesList" style="padding-bottom:16px"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, deleteDoc,
    doc, onSnapshot, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyD4zRLZ4VzsI9HVU-OJVv_m89lqRrKjp7w",
    authDomain:        "madrid-705fe.firebaseapp.com",
    projectId:         "madrid-705fe",
    storageBucket:     "madrid-705fe.firebasestorage.app",
    messagingSenderId: "951836306012",
    appId:             "1:951836306012:web:64bf3fae67499ed2ef9499"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const col = collection(db, "places");

  // ── Map ───────────────────────────────────────────────────────────────────
  // Centré sur l'aéroport Adolfo Suárez de Madrid
  const map = L.map('map').setView([40.4583, -3.4847], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // ── State ─────────────────────────────────────────────────────────────────
  let addMode       = false;
  let pendingLatLng = null;
  let currentFilter = 'all';
  let selectedStars = 3;
  let markers       = {};
  let places        = [];
  let listCollapsed = false;

  const catColors = { resto: '#ff4444', courses: '#44cc66', sympa: '#4488ff' };
  const catLabels = { resto: '🍽 Restaurant', courses: '🛒 Courses', sympa: '⭐ Sympa' };

  // ── Stars ─────────────────────────────────────────────────────────────────
  function renderModalStars(val) {
    const container = document.getElementById('modalStars');
    container.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'star-btn' + (i <= val ? ' active' : '');
      btn.textContent = '★';
      btn.onclick = () => { selectedStars = i; renderModalStars(i); };
      container.appendChild(btn);
    }
  }
  renderModalStars(selectedStars);

  // ── Add mode ──────────────────────────────────────────────────────────────
  window.toggleAddMode = function() {
    addMode = !addMode;
    document.getElementById('fab').classList.toggle('active', addMode);
    document.getElementById('addHint').classList.toggle('visible', addMode);
    map.getContainer().style.cursor = addMode ? 'crosshair' : '';
  };

  map.on('click', (e) => {
    if (!addMode) return;
    pendingLatLng = e.latlng;
    document.getElementById('placeName').value = '';
    document.getElementById('placeNote').value = '';
    document.getElementById('placeCat').value = 'resto';
    selectedStars = 3;
    renderModalStars(3);
    document.getElementById('modalOverlay').style.display = 'flex';
  });

  // ── Modal ─────────────────────────────────────────────────────────────────
  window.closeModal = function() {
    document.getElementById('modalOverlay').style.display = 'none';
    pendingLatLng = null;
  };

  window.savePlace = async function() {
    const name = document.getElementById('placeName').value.trim();
    const cat  = document.getElementById('placeCat').value;
    const note = document.getElementById('placeNote').value.trim();
    if (!name) { showToast('Saisis un nom !'); return; }
    if (!pendingLatLng) { showToast('Clique sur la carte d\'abord'); return; }
    const btn = document.querySelector('.btn-save');
    btn.disabled = true;
    btn.textContent = '…';
    try {
      await addDoc(col, {
        name, cat, note,
        stars: selectedStars,
        lat: pendingLatLng.lat,
        lng: pendingLatLng.lng,
        createdAt: serverTimestamp()
      });
      closeModal();
      if (addMode) toggleAddMode();
      showToast('Endroit ajouté ✓');
    } catch(e) {
      showToast('Erreur : ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Enregistrer';
    }
  };

  // ── Filter ────────────────────────────────────────────────────────────────
  window.setFilter = function(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
    btn.classList.add('active-' + filter);
    Object.entries(markers).forEach(([id, { marker, cat }]) => {
      if (filter === 'all' || filter === cat) marker.addTo(map);
      else map.removeLayer(marker);
    });
    renderList();
  };

  // ── Marker ────────────────────────────────────────────────────────────────
  function makeIcon(cat) {
    const color = catColors[cat] || '#888';
    const svg = `<svg width="28" height="36" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 0C6.268 0 0 6.268 0 14c0 10.5 14 22 14 22S28 24.5 28 14C28 6.268 21.732 0 14 0z" fill="${color}"/>
      <circle cx="14" cy="14" r="6" fill="white"/>
    </svg>`;
    return L.divIcon({
      className: '',
      html: svg,
      iconSize: [28, 36],
      iconAnchor: [14, 36],
      popupAnchor: [0, -36]
    });
  }

  // ── Delete ────────────────────────────────────────────────────────────────
  window.deletePlace = async function(id) {
    if (!confirm('Supprimer cet endroit ?')) return;
    await deleteDoc(doc(db, 'places', id));
    showToast('Endroit supprimé');
  };

  // ── List ──────────────────────────────────────────────────────────────────
  window.toggleList = function() {
    listCollapsed = !listCollapsed;
    document.getElementById('listPanel').classList.toggle('collapsed', listCollapsed);
  };

  function renderList() {
    const filtered = currentFilter === 'all' ? places : places.filter(p => p.cat === currentFilter);
    const container = document.getElementById('placesList');
    const countEl   = document.getElementById('listCount');
    countEl.textContent = `${filtered.length} endroit${filtered.length > 1 ? 's' : ''}`;

    if (filtered.length === 0) {
      container.innerHTML = '<div style="padding:20px;text-align:center;font-family:\'DM Mono\',monospace;font-size:12px;color:var(--muted)">Aucun endroit</div>';
      return;
    }

    container.innerHTML = '';
    filtered.forEach(item => {
      const div = document.createElement('div');
      div.className = 'place-row';
      div.onclick = () => {
        if (markers[item.id]) {
          map.flyTo([item.lat, item.lng], 17);
          markers[item.id].marker.openPopup();
          if (!listCollapsed) toggleList();
        }
      };
      const stars = '★'.repeat(item.stars || 0) + '☆'.repeat(5 - (item.stars || 0));
      div.innerHTML = `
        <div class="place-dot" style="background:${catColors[item.cat] || '#888'}"></div>
        <div class="place-info">
          <div class="place-name">${escHtml(item.name)}</div>
          ${item.note ? `<div class="place-comment">${escHtml(item.note)}</div>` : ''}
        </div>
        <div class="place-stars">${stars}</div>
      `;
      container.appendChild(div);
    });
  }

  // ── Realtime ──────────────────────────────────────────────────────────────
  onSnapshot(col, (snapshot) => {
    snapshot.docChanges().forEach(change => {
      const id = change.doc.id;
      const d  = change.doc.data();

      if (change.type === 'removed') {
        if (markers[id]) { map.removeLayer(markers[id].marker); delete markers[id]; }
        places = places.filter(p => p.id !== id);
      } else if (change.type === 'added') {
        const starsHtml = '★'.repeat(d.stars || 0) + '☆'.repeat(5 - (d.stars || 0));
        const marker = L.marker([d.lat, d.lng], { icon: makeIcon(d.cat) });
        marker.bindPopup(`
          <div class="popup-name">${escHtml(d.name)}</div>
          <div class="popup-cat" style="color:${catColors[d.cat]}">${catLabels[d.cat] || d.cat}</div>
          <div class="popup-stars">${starsHtml}</div>
          ${d.note ? `<div class="popup-note">${escHtml(d.note)}</div>` : ''}
          <button class="popup-del" onclick="deletePlace('${id}')">Supprimer</button>
        `);
        marker.bindTooltip(
          `<strong>${escHtml(d.name)}</strong>${d.note ? '<br><span style="color:#aaa;font-size:11px">' + escHtml(d.note) + '</span>' : ''}`,
          { direction: 'top', offset: [0, -36] }
        );
        if (currentFilter === 'all' || currentFilter === d.cat) marker.addTo(map);
        markers[id] = { marker, cat: d.cat };
        places.push({ id, ...d });
      } else if (change.type === 'modified') {
        places = places.map(p => p.id === id ? { id, ...d } : p);
      }
    });
    renderList();
  });

  // ── Utils ─────────────────────────────────────────────────────────────────
  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  window.showToast = function(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  };
</script>
</body>
</html>
